<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Background -->
  <rect width="64" height="64" rx="14" fill="#0f0f23"/>

  <!-- Radar/signal rings -->
  <circle cx="32" cy="32" r="24" stroke="#E53935" stroke-width="2" fill="none" opacity="0.2"/>
  <circle cx="32" cy="32" r="16" stroke="#E53935" stroke-width="2" fill="none" opacity="0.5"/>
  <circle cx="32" cy="32" r="8" stroke="#E53935" stroke-width="2.5" fill="none"/>

  <!-- Center dot -->
  <circle cx="32" cy="32" r="4" fill="#E53935"/>

  <!-- Pulse indicators -->
  <line x1="32" y1="6" x2="32" y2="14" stroke="#E53935" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  <line x1="56" y1="32" x2="48" y2="32" stroke="#E53935" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  <line x1="32" y1="58" x2="32" y2="50" stroke="#E53935" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
  <line x1="8" y1="32" x2="16" y2="32" stroke="#E53935" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
</svg>
