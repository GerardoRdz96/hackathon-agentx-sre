<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 100" fill="none">
  <!-- Background pill -->
  <rect x="0" y="10" width="400" height="80" rx="16" fill="#0f0f23"/>

  <!-- Accent bar left -->
  <rect x="0" y="10" width="6" height="80" rx="3" fill="#E53935"/>

  <!-- Signal/radar icon -->
  <g transform="translate(30, 30)">
    <!-- Outer ring -->
    <circle cx="20" cy="20" r="18" stroke="#E53935" stroke-width="2.5" fill="none" opacity="0.3"/>
    <!-- Middle ring -->
    <circle cx="20" cy="20" r="12" stroke="#E53935" stroke-width="2" fill="none" opacity="0.6"/>
    <!-- Inner ring -->
    <circle cx="20" cy="20" r="6" stroke="#E53935" stroke-width="2" fill="none"/>
    <!-- Center dot -->
    <circle cx="20" cy="20" r="3" fill="#E53935"/>
    <!-- Pulse line -->
    <line x1="20" y1="2" x2="20" y2="10" stroke="#E53935" stroke-width="2" stroke-linecap="round"/>
    <line x1="36" y1="20" x2="28" y2="20" stroke="#E53935" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- Text: Incidex -->
  <text x="85" y="62" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="700" fill="#ffffff" letter-spacing="-0.5">
    Incid<tspan fill="#E53935">ex</tspan>
  </text>

  <!-- Tagline -->
  <text x="260" y="58" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#666" letter-spacing="1">
    by Penguin Alley
  </text>
</svg>
